<!DOCTYPE html>
<html>
<head>
    <title>Track Me - Live View</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // तुझे Firebase Config (सेम sender सारखंच)
        const firebaseConfig = {
            apiKey: "AIzaSyB3d6vrPYdmXpEvtKzR7srngx4_DErWyhU",
            databaseURL: "https://trackme-75509-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "trackme-75509",
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // नकाशा सुरू करणे (सुरुवातीला भारतावर सेट केला आहे)
        const map = L.map('map').setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // मार्कर तयार करणे
        const marker = L.marker([0, 0]).addTo(map).bindPopup("प्रितम इथे आहे!").openPopup();

        // डेटाबेसमधून रिअल-टाइम डेटा वाचणे
        database.ref('mylocation/').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const newPos = [data.lat, data.lon];
                
                // मार्करची जागा अपडेट करणे (Live Moving)
                marker.setLatLng(newPos);
                
                // नकाशा आपोआप हालचालीनुसार सेंटरला येण्यासाठी
                map.panTo(newPos);
                
                // पहिल्यांदा लोकेशन मिळाल्यावर झूम लेव्हल वाढवणे
                if (map.getZoom() < 10) {
                    map.setZoom(16);
                }
            }
        }, (error) => {
            console.error("डेटा वाचताना एरर आली: ", error);
        });
    </script>
</body>
</html>
